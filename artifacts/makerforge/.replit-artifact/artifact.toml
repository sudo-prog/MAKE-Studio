kind = "web"
previewPath = "/"
title = "MakerForge"
version = "1.0.0"
id = "artifacts/makerforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21078

[services.development]
run = "pnpm --filter @workspace/makerforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/makerforge", "run", "build" ]
publicDir = "artifacts/makerforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21078"
BASE_PATH = "/"
