openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MakerForge API — AI-powered hardware project generation platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile and settings
  - name: projects
    description: Hardware project CRUD
  - name: generate
    description: AI generation pipeline
  - name: templates
    description: Project templates
  - name: bom
    description: Bill of materials
  - name: credits
    description: Credits and subscription
  - name: dashboard
    description: Dashboard summary endpoints
  - name: public
    description: Public/unauthenticated endpoints
  - name: integrations
    description: Third-party integration hub (GitHub, OctoPrint, Makerspace)
  - name: community
    description: Showcase feed, challenges, gallery, share cards
  - name: admin
    description: Admin-only analytics endpoints
  - name: affiliate
    description: Affiliate earnings and click tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── USER ──────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── PROJECTS ──────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List current user's projects
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Projects list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/sections:
    get:
      operationId: getProjectSections
      tags: [projects]
      summary: Get all sections for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSections"

  /projects/{id}/messages:
    get:
      operationId: getProjectMessages
      tags: [projects]
      summary: Get chat message history for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: addProjectMessage
      tags: [projects]
      summary: Add a user chat message (triggers generation)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "201":
          description: Message added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /projects/{id}/export:
    get:
      operationId: exportProject
      tags: [projects]
      summary: Export project as ZIP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ZIP file
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /projects/{id}/share:
    post:
      operationId: shareProject
      tags: [projects]
      summary: Generate or get shareable public link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLink"

  # ── AI GENERATION ─────────────────────────────────────────────────────────
  /generate:
    post:
      operationId: generateProject
      tags: [generate]
      summary: Generate a new project package from a prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateInput"
      responses:
        "200":
          description: Generated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "402":
          description: Insufficient credits

  /generate/{projectId}/refine:
    post:
      operationId: refineProjectSection
      tags: [generate]
      summary: Refine a specific project section with a prompt
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefineInput"
      responses:
        "200":
          description: Updated project sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSections"

  # ── TEMPLATES ─────────────────────────────────────────────────────────────
  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List curated project templates
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Templates list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"

  /templates/{id}/fork:
    post:
      operationId: forkTemplate
      tags: [templates]
      summary: Fork a template into a new project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Forked project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  # ── CREDITS ───────────────────────────────────────────────────────────────
  /credits:
    get:
      operationId: getCredits
      tags: [credits]
      summary: Get current user credit balance and tier
      responses:
        "200":
          description: Credits info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditsInfo"

  /credits/checkout:
    post:
      operationId: createCheckout
      tags: [credits]
      summary: Create Stripe checkout session for Pro subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /credits/portal:
    post:
      operationId: createBillingPortal
      tags: [credits]
      summary: Create Stripe billing portal session
      responses:
        "200":
          description: Portal URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPortal"

  # ── DASHBOARD / WOW ───────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get user dashboard summary (totals, recent activity)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent:
    get:
      operationId: getRecentProjects
      tags: [dashboard]
      summary: Get recently edited projects for quick access
      responses:
        "200":
          description: Recent projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectCard"

  # ── PUBLIC ────────────────────────────────────────────────────────────────
  /public/projects/{slug}:
    get:
      operationId: getPublicProject
      tags: [public]
      summary: Get a public project by share slug (no auth required)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found

  /public/gallery:
    get:
      operationId: getPublicGallery
      tags: [public]
      summary: Browse public project gallery
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Gallery projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"

  # ── INTEGRATIONS ──────────────────────────────────────────────────────────
  /integrations/github/connect:
    get:
      operationId: getGitHubConnect
      tags: [integrations]
      summary: Start GitHub OAuth flow (redirects to GitHub)
      security:
        - clerkAuth: []
      responses:
        "302":
          description: Redirect to GitHub OAuth

  /integrations/github/callback:
    get:
      operationId: getGitHubCallback
      tags: [integrations]
      summary: GitHub OAuth callback — exchanges code for token
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to integrations page on success
        "400":
          description: Invalid state or code

  /integrations/github/status:
    get:
      operationId: getGitHubStatus
      tags: [integrations]
      summary: Get GitHub connection status
      security:
        - clerkAuth: []
      responses:
        "200":
          description: GitHub status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubStatus"

  /integrations/github/disconnect:
    post:
      operationId: disconnectGitHub
      tags: [integrations]
      summary: Disconnect GitHub integration
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Disconnected

  /integrations/github/push:
    post:
      operationId: pushToGitHub
      tags: [integrations]
      summary: Push project files to a GitHub repository
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId]
              properties:
                projectId:
                  type: integer
                repoName:
                  type: string
                createNew:
                  type: boolean
      responses:
        "200":
          description: Pushed
          content:
            application/json:
              schema:
                type: object
                properties:
                  repoUrl:
                    type: string

  /integrations/octoprint/connect:
    post:
      operationId: connectOctoPrint
      tags: [integrations]
      summary: Connect an OctoPrint instance (validates URL + connectivity, saves AES-256-GCM encrypted API key)
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [octoprintUrl, apiKey]
              properties:
                octoprintUrl:
                  type: string
                  description: LAN or public URL of the OctoPrint instance (e.g. http://192.168.1.100). Loopback and cloud-metadata URLs are blocked.
                apiKey:
                  type: string
      responses:
        "200":
          description: Connected — credentials stored encrypted server-side
        "400":
          description: Invalid URL (SSRF guard) or OctoPrint unreachable at provided URL

  /integrations/octoprint/status:
    get:
      operationId: getOctoPrintStatus
      tags: [integrations]
      summary: Get OctoPrint connection status, current job, and file list
      security:
        - clerkAuth: []
      responses:
        "200":
          description: OctoPrint status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OctoPrintStatus"

  /integrations/octoprint/upload:
    post:
      operationId: uploadToOctoPrint
      tags: [integrations]
      summary: Upload a GCODE/STL file to OctoPrint (base64 encoded)
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, content]
              properties:
                filename:
                  type: string
                content:
                  type: string
                  description: Base64-encoded file content
      responses:
        "200":
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /integrations/octoprint/start-print:
    post:
      operationId: startOctoPrint
      tags: [integrations]
      summary: Select a file and start printing on OctoPrint
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename]
              properties:
                filename:
                  type: string
      responses:
        "200":
          description: Print started
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  printing:
                    type: string

  /integrations/octoprint/disconnect:
    post:
      operationId: disconnectOctoPrint
      tags: [integrations]
      summary: Remove stored OctoPrint credentials and disconnect the integration
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /integrations/makerspace-search:
    get:
      operationId: searchMakerspaces
      tags: [integrations]
      summary: Find nearby makerspaces by ZIP code
      security:
        - clerkAuth: []
      parameters:
        - name: zip
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Nearby makerspaces
          content:
            application/json:
              schema:
                type: object
                properties:
                  zip:
                    type: string
                  spaces:
                    type: array
                    items:
                      $ref: "#/components/schemas/Makerspace"

  # ── COMMUNITY ─────────────────────────────────────────────────────────────
  /projects/{id}/share-card:
    get:
      operationId: getProjectShareCard
      tags: [community]
      summary: Get OG metadata and affiliate highlights for social sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share card metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareCard"
        "404":
          description: Project not found or not public

  /projects/{id}/share-card.svg:
    get:
      operationId: getProjectShareCardSvg
      tags: [community]
      summary: Rendered SVG social card image (1200×630, suitable for og:image)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SVG image
          content:
            image/svg+xml:
              schema:
                type: string
        "404":
          description: Project not found or not public

  /showcase:
    get:
      operationId: getShowcasePosts
      tags: [community]
      summary: List showcase posts (community builds feed)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Showcase posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ShowcasePost"
                  total:
                    type: integer
    post:
      operationId: createShowcasePost
      tags: [community]
      summary: Share a project to the showcase feed
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId]
              properties:
                projectId:
                  type: integer
                caption:
                  type: string
                imageUrls:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Created showcase post

  /showcase/{id}/like:
    post:
      operationId: likeShowcasePost
      tags: [community]
      summary: Toggle like on a showcase post
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Like toggled

  /challenges:
    get:
      operationId: getChallenges
      tags: [community]
      summary: List active build challenges
      responses:
        "200":
          description: Challenges list

  /challenges/{id}/submit:
    post:
      operationId: submitChallenge
      tags: [community]
      summary: Submit a project to a challenge
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId]
              properties:
                projectId:
                  type: integer
                note:
                  type: string
      responses:
        "201":
          description: Submitted

  /admin/analytics:
    get:
      operationId: getAdminAnalytics
      tags: [admin]
      summary: Admin analytics dashboard (admin email required)
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnalytics"
        "403":
          description: Admin only

  /affiliate/earnings:
    get:
      operationId: getAffiliateEarnings
      tags: [affiliate]
      summary: Get affiliate click earnings summary for current user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Affiliate earnings

# ── WEBHOOK (no generated hooks, server-only) ─────────────────────────────
# POST /stripe/webhook — handled in Express, not in spec (raw body required)

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── USER ────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, clerkId, email, tier, creditsBalance, educationMode, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        tier:
          type: string
          enum: [free, pro]
        creditsBalance:
          type: integer
        educationMode:
          type: boolean
        githubConnected:
          type: boolean
        octoprintConnected:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
        educationMode:
          type: boolean

    # ── PROJECT ─────────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, title, prompt, status, isPublic, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        prompt:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, generating, ready, error]
        isPublic:
          type: boolean
        shareSlug:
          type: ["string", "null"]
        renderImageUrl:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        skillLevel:
          type: ["string", "null"]
        estimatedCost:
          type: ["number", "null"]
        estimatedTime:
          type: ["string", "null"]
        sections:
          $ref: "#/components/schemas/ProjectSections"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectCard:
      type: object
      required: [id, title, status, renderImageUrl, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        renderImageUrl:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        estimatedCost:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectCard"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ProjectInput:
      type: object
      required: [title, prompt]
      properties:
        title:
          type: string
        prompt:
          type: string
        category:
          type: string
        skillLevel:
          type: string
          enum: [beginner, intermediate, advanced]

    ProjectUpdate:
      type: object
      properties:
        title:
          type: string
        isPublic:
          type: boolean
        category:
          type: string

    ProjectSections:
      type: object
      properties:
        mechanical:
          $ref: "#/components/schemas/MechanicalSection"
        electronics:
          $ref: "#/components/schemas/ElectronicsSection"
        bom:
          $ref: "#/components/schemas/BomSection"
        buildGuide:
          $ref: "#/components/schemas/BuildGuideSection"
        educationPack:
          $ref: "#/components/schemas/EducationSection"
        safety:
          $ref: "#/components/schemas/SafetySection"

    MechanicalSection:
      type: object
      properties:
        openScadCode:
          type: ["string", "null"]
        printSettings:
          type: ["string", "null"]
        materials:
          type: array
          items:
            type: string
        assemblyNotes:
          type: ["string", "null"]

    ElectronicsSection:
      type: object
      properties:
        schematicDescription:
          type: ["string", "null"]
        kiCadInstructions:
          type: ["string", "null"]
        wiringDiagram:
          type: ["string", "null"]
        powerCalcs:
          type: ["string", "null"]
        components:
          type: array
          items:
            type: string

    BomSection:
      type: object
      properties:
        tiers:
          type: object
          properties:
            budget:
              type: array
              items:
                $ref: "#/components/schemas/BomItem"
            balanced:
              type: array
              items:
                $ref: "#/components/schemas/BomItem"
            premium:
              type: array
              items:
                $ref: "#/components/schemas/BomItem"

    BomItem:
      type: object
      required: [name, quantity, unit, estimatedPrice]
      properties:
